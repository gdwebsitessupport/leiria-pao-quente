version: 2

multi-ecosystem-groups:
  weekly-dependencies:
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "05:00"
      timezone: "Europe/Lisbon"

updates:
  - package-ecosystem: "npm"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "weekly-dependencies"
    labels:
      - "dependencies"
      - "dependabot"
    groups:
      all-npm-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "weekly-dependencies"
    labels:
      - "dependencies"
      - "dependabot"
